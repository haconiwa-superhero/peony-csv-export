<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注文CSVエクスポート | Peony</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f6f6f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="date"]:focus {
      border-color: #008060;
    }
    .btn {
      width: 100%;
      padding: 13px;
      background: #008060;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #006e4f; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .note {
      margin-top: 20px;
      padding: 12px;
      background: #f0fdf4;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #166534;
      line-height: 1.6;
    }
    .loading {
      display: none;
      text-align: center;
      margin-top: 12px;
      color: #6b7280;
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Peony 注文CSVエクスポート</div>
    <div class="subtitle">期間を指定して倉庫向けCSVをダウンロードできます</div>

    <div class="form-group">
      <label>開始日</label>
      <input type="date" id="start">
    </div>
    <div class="form-group">
      <label>終了日</label>
      <input type="date" id="end">
    </div>

    <button class="btn" id="exportBtn" onclick="exportCSV()">
      CSVをダウンロード
    </button>

    <div class="loading" id="loading">取得中です。しばらくお待ちください...</div>

    <div class="note">
      ✅ バンドル商品は自動的に個別SKUに展開されます<br>
      ✅ 文字コードはShift-JIS（ANSI）で出力されます
    </div>
  </div>

  <script>
    // デフォルト: 今日
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('start').value = today;
    document.getElementById('end').value = today;

    function exportCSV() {
      const start = document.getElementById('start').value;
      const end = document.getElementById('end').value;
      if (!start || !end) {
        alert('開始日と終了日を入力してください');
        return;
      }
      if (start > end) {
        alert('開始日は終了日より前にしてください');
        return;
      }

      const btn = document.getElementById('exportBtn');
      const loading = document.getElementById('loading');
      btn.disabled = true;
      loading.style.display = 'block';

      // ダウンロードはiframeで行うことでボタンを再活性化できる
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = `/export?start=${start}&end=${end}`;
      document.body.appendChild(iframe);

      setTimeout(() => {
        btn.disabled = false;
        loading.style.display = 'none';
        document.body.removeChild(iframe);
      }, 5000);
    }
  </script>
</body>
</html>
