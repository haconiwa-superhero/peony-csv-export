<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKUマップ管理 | Peony</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f6f6f7;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 36px;
      max-width: 680px;
      margin: 0 auto 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .title { font-size: 1.2rem; font-weight: 700; color: #1a1a1a; }
    .back { font-size: 0.85rem; color: #6b7280; text-decoration: none; }
    .back:hover { color: #374151; }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #008060; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary   { background: #008060; color: white; }
    .btn-primary:hover { background: #006e4f; }
    .btn-danger    { background: #fee2e2; color: #b91c1c; }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm { padding: 5px 12px; font-size: 0.82rem; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th { text-align: left; padding: 8px 10px; background: #f9fafb; color: #6b7280; font-size: 0.82rem; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
    td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; font-size: 0.88rem; }
    td input { border: 1px solid transparent; background: transparent; padding: 4px 6px; border-radius: 4px; width: 100%; }
    td input:focus { border-color: #008060; background: #fff; }
    .add-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .add-row input { flex: 1; }
    .msg { padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; margin-bottom: 16px; display: none; }
    .msg-success { background: #d1fae5; color: #065f46; }
    .msg-error   { background: #fee2e2; color: #b91c1c; }
    .login-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .warning {
      padding: 10px 14px;
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      border-radius: 4px;
      font-size: 0.82rem;
      color: #92400e;
      margin-bottom: 20px;
    }
    #mainContent { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="title">SKUマップ管理</div>
      <a class="back" href="/">← 戻る</a>
    </div>

    <!-- ログイン -->
    <div id="loginArea">
      <div class="login-group">
        <label>管理者パスワード</label>
        <input type="password" id="password" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn btn-primary" onclick="login()">ログイン</button>
      <div class="msg msg-error" id="loginError">パスワードが違います</div>
    </div>

    <!-- メインコンテンツ -->
    <div id="mainContent">
      <div class="warning">
        ⚠️ ここでの変更はサーバー再起動でリセットされます。恒久的に変更する場合はコードの更新が必要です。
      </div>

      <div class="msg" id="saveMsg"></div>

      <div class="add-row">
        <input type="text" id="newKey" placeholder="商品オプション値（例: NEW PRODUCT 01）">
        <input type="text" id="newVal" placeholder="SKUコード（例: NP-01）">
        <button class="btn btn-primary btn-sm" onclick="addRow()">追加</button>
      </div>

      <table>
        <thead><tr><th>商品オプション値</th><th>SKUコード</th><th></th></tr></thead>
        <tbody id="skuTableBody"></tbody>
      </table>

      <button class="btn btn-primary" onclick="save()">保存する</button>
    </div>
  </div>

  <script>
    let password = '';
    let skuData  = {};

    async function login() {
      password = document.getElementById('password').value;
      const resp = await fetch('/api/sku-map');
      if (!resp.ok) { showLoginError(); return; }

      // パスワード確認として空のPOSTを送る
      const test = await fetch('/api/sku-map', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, map: null }),
      });
      if (test.status === 401) { showLoginError(); return; }

      skuData = await resp.json();
      document.getElementById('loginArea').style.display    = 'none';
      document.getElementById('mainContent').style.display  = 'block';
      renderTable();
    }

    function showLoginError() {
      document.getElementById('loginError').style.display = 'block';
    }

    function renderTable() {
      const tbody = document.getElementById('skuTableBody');
      tbody.innerHTML = Object.entries(skuData).map(([k, v]) => `
        <tr>
          <td><input type="text" value="${escHtml(k)}" data-key="${escHtml(k)}" class="key-input" onchange="onKeyChange(this, '${escHtml(k)}')"></td>
          <td><input type="text" value="${escHtml(v)}" data-key="${escHtml(k)}" class="val-input"></td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteRow('${escHtml(k)}')">削除</button></td>
        </tr>
      `).join('');
    }

    function onKeyChange(input, oldKey) {
      const newKey = input.value.trim().toUpperCase();
      const val = skuData[oldKey];
      delete skuData[oldKey];
      skuData[newKey] = val;
      input.dataset.key = newKey;
    }

    function addRow() {
      const key = document.getElementById('newKey').value.trim().toUpperCase();
      const val = document.getElementById('newVal').value.trim();
      if (!key || !val) { alert('両方入力してください'); return; }
      skuData[key] = val;
      document.getElementById('newKey').value = '';
      document.getElementById('newVal').value = '';
      renderTable();
    }

    function deleteRow(key) {
      delete skuData[key];
      renderTable();
    }

    async function save() {
      // テーブルから最新の値を収集
      const map = {};
      document.querySelectorAll('#skuTableBody tr').forEach(tr => {
        const key = tr.querySelector('.key-input').value.trim().toUpperCase();
        const val = tr.querySelector('.val-input').value.trim();
        if (key && val) map[key] = val;
      });

      const resp = await fetch('/api/sku-map', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, map }),
      });

      const msg = document.getElementById('saveMsg');
      if (resp.ok) {
        skuData = map;
        msg.textContent = '✅ 保存しました';
        msg.className   = 'msg msg-success';
      } else {
        msg.textContent = '❌ 保存に失敗しました';
        msg.className   = 'msg msg-error';
      }
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
    }

    function escHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
